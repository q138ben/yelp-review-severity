              service:
                runtimeValue:
                  constant: yelp-rating-api
              service_account:
                runtimeValue:
                  constant: yelp-mlops@yelp-review-rating-prediction.iam.gserviceaccount.com
          taskInfo:
            name: deploy-cloud-run
    inputDefinitions:
      parameters:
        pipelinechannel--model_dir:
          parameterType: STRING
        pipelinechannel--qwk_gate:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--read-metrics-qwk:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--train_model:
          parameterType: BOOLEAN
  comp-condition-3:
    dag:
      tasks:
        bigquery-query-job:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-bigquery-query-job
          inputs:
            parameters:
              location:
                runtimeValue:
                  constant: europe-north1
              project:
                runtimeValue:
                  constant: yelp-review-rating-prediction
              query:
                runtimeValue:
                  constant: "-- BRONZE: land the raw GCS JSON into BigQuery tables\
                    \ (idempotent OVERWRITE).\n-- Run by the pipeline as a BigQuery\
                    \ job. Uses BQ's LOAD DATA ... FROM FILES (no bash bq load).\n\
                    -- attributes/hours kept as JSON to absorb the schema drift in\
                    \ business.json; silver ignores them.\n\nLOAD DATA OVERWRITE bronze.reviews_raw\
                    \ (\n  review_id STRING, user_id STRING, business_id STRING,\n\
                    \  stars FLOAT64, useful INT64, funny INT64, cool INT64,\n  text\
                    \ STRING, date STRING\n)\nFROM FILES (\n  format = 'JSON',\n \
                    \ uris = ['gs://yelp-review-rating-prediction-mlops/bronze/review/*.json']\n\
                    );\n\nLOAD DATA OVERWRITE bronze.business_raw (\n  business_id\
                    \ STRING, name STRING, address STRING, city STRING, state STRING,\n\
                    \  postal_code STRING, latitude FLOAT64, longitude FLOAT64,\n\
                    \  stars FLOAT64, review_count INT64, is_open INT64,\n  categories\
                    \ STRING, attributes JSON, hours JSON\n)\nFROM FILES (\n  format\
                    \ = 'JSON',\n  uris = ['gs://yelp-review-rating-prediction-mlops/bronze/business/*.json']\n\
                    );\n"
          taskInfo:
            name: bronze-load
        bigquery-query-job-2:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-bigquery-query-job-2
          dependentTasks:
          - bigquery-query-job
          inputs:
            parameters:
              location:
                runtimeValue:
                  constant: europe-north1
              project:
                runtimeValue:
                  constant: yelp-review-rating-prediction
              query:
                runtimeValue:
                  constant: "-- SILVER: cleaned, typed, deduped. Runs with `bq query\
                    \ --project_id=<PROJECT>`.\n-- Tables are dataset-qualified (no\
                    \ project prefix) so they resolve to the job's default project.\n\
                    \n-- Reviews: type-cast, parse timestamp, drop empty/null text,\
                    \ dedup exact-duplicate text,\n-- and stamp the leakage-safe business-level\
                    \ split (deterministic via FARM_FINGERPRINT).\nCREATE OR REPLACE\
                    \ TABLE silver.reviews\nCLUSTER BY split AS\nWITH deduped AS (\n\
                    \  SELECT *,\n         ROW_NUMBER() OVER (PARTITION BY FARM_FINGERPRINT(text)\
                    \ ORDER BY date) AS rn\n  FROM bronze.reviews_raw\n  WHERE text\
                    \ IS NOT NULL AND LENGTH(TRIM(text)) > 0 AND stars IS NOT NULL\n\
                    )\nSELECT\n  review_id,\n  business_id,\n  user_id,\n  CAST(stars\
                    \ AS INT64)                                   AS stars,\n  useful,\
                    \ funny, cool,\n  text,\n  LENGTH(text)                      \
                    \                    AS text_len,\n  SAFE.PARSE_TIMESTAMP('%Y-%m-%d\
                    \ %H:%M:%S', date)       AS review_ts,\n  CASE\n    WHEN MOD(ABS(FARM_FINGERPRINT(business_id)),\
                    \ 100) < 70 THEN 'train'\n    WHEN MOD(ABS(FARM_FINGERPRINT(business_id)),\
                    \ 100) < 85 THEN 'val'\n    ELSE 'test'\n  END               \
                    \                                    AS split\nFROM deduped\n\
                    WHERE rn = 1;\n\n-- Business: keep the modelling-relevant columns;\
                    \ derive the restaurant flag (EDA: 73% of reviews).\nCREATE OR\
                    \ REPLACE TABLE silver.business AS\nSELECT\n  business_id,\n \
                    \ name, city, state, postal_code,\n  latitude, longitude,\n  stars\
                    \                                                 AS business_avg_stars,\n\
                    \  review_count,\n  is_open,\n  categories,\n  (LOWER(categories)\
                    \ LIKE '%restaurant%' OR LOWER(categories) LIKE '%food%') AS is_restaurant\n\
                    FROM bronze.business_raw\nWHERE business_id IS NOT NULL;\n"
          taskInfo:
            name: silver-clean
        bigquery-query-job-3:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-bigquery-query-job-3
          dependentTasks:
          - bigquery-query-job-2
          inputs:
            parameters:
              location:
                runtimeValue:
                  constant: europe-north1
              project:
                runtimeValue:
                  constant: yelp-review-rating-prediction
              query:
                runtimeValue:
                  constant: "-- GOLD: ML-ready training set. Text -> stars (ordinal\
                    \ label), leakage-safe split, restaurant context.\n-- Deterministic\
                    \ downsample to a tractable, class-preserving set (~100k/20k/20k)\
                    \ via FARM_FINGERPRINT.\n-- Identifiers (review_id/business_id)\
                    \ are kept for traceability only, NOT as model features.\n-- user_avg\
                    \ / business_avg stars are deliberately EXCLUDED (they leak the\
                    \ label \u2014 see notebook 02).\nCREATE OR REPLACE TABLE gold.training_data\n\
                    CLUSTER BY split AS\nSELECT\n  r.review_id,\n  r.business_id,\n\
                    \  r.text,\n  r.stars,\n  r.text_len,\n  COALESCE(b.is_restaurant,\
                    \ FALSE) AS is_restaurant,\n  r.split\nFROM silver.reviews r\n\
                    LEFT JOIN silver.business b USING(business_id)\nWHERE\n  (r.split\
                    \ = 'train'          AND MOD(ABS(FARM_FINGERPRINT(r.review_id)),\
                    \ 100000) < 2100)\n  OR (r.split IN ('val','test') AND MOD(ABS(FARM_FINGERPRINT(r.review_id)),\
                    \ 100000) < 1950);\n\n-- Monitoring view: label distribution per\
                    \ split (feeds a data-quality/drift check).\nCREATE OR REPLACE\
                    \ VIEW gold.label_distribution AS\nSELECT split, stars, COUNT(*)\
                    \ AS n,\n       ROUND(100 * COUNT(*) / SUM(COUNT(*)) OVER (PARTITION\
                    \ BY split), 2) AS pct\nFROM gold.training_data\nGROUP BY split,\
                    \ stars\nORDER BY split, stars;\n"
          taskInfo:
            name: gold-features
        condition-2:
          componentRef:
            name: comp-condition-2
          dependentTasks:
          - read-metrics
          inputs:
            parameters:
              pipelinechannel--model_dir:
                componentInputParameter: pipelinechannel--model_dir
              pipelinechannel--qwk_gate:
                componentInputParameter: pipelinechannel--qwk_gate
              pipelinechannel--read-metrics-qwk:
                taskOutputParameter:
