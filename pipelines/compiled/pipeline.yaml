          componentRef:
            name: comp-deploy-cloud-run-2
          inputs:
            parameters:
              cpu:
                runtimeValue:
                  constant: '2'
              image:
                runtimeValue:
                  constant: europe-north1-docker.pkg.dev/yelp-review-rating-prediction/yelp-mlops/serve:latest
              max_instances:
                runtimeValue:
                  constant: 3.0
              memory:
                runtimeValue:
                  constant: 4Gi
              min_instances:
                runtimeValue:
                  constant: 0.0
              model_uri:
                componentInputParameter: pipelinechannel--model_dir
              project:
                runtimeValue:
                  constant: yelp-review-rating-prediction
              region:
                runtimeValue:
                  constant: europe-north1
              service:
                runtimeValue:
                  constant: yelp-rating-api
              service_account:
                runtimeValue:
                  constant: yelp-mlops@yelp-review-rating-prediction.iam.gserviceaccount.com
          taskInfo:
            name: deploy-cloud-run-2
    inputDefinitions:
      parameters:
        pipelinechannel--model_dir:
          parameterType: STRING
        pipelinechannel--qwk_gate:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--read-metrics-2-qwk:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--train_model:
          parameterType: BOOLEAN
  comp-condition-branches-1:
    dag:
      tasks:
        condition-3:
          componentRef:
            name: comp-condition-3
          inputs:
            parameters:
              pipelinechannel--model_dir:
                componentInputParameter: pipelinechannel--model_dir
              pipelinechannel--qwk_gate:
                componentInputParameter: pipelinechannel--qwk_gate
              pipelinechannel--train_model:
                componentInputParameter: pipelinechannel--train_model
          taskInfo:
            name: train-and-deploy
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--train_model'] ==
              true
        condition-4:
          componentRef:
            name: comp-condition-4
          inputs:
            parameters:
              pipelinechannel--model_dir:
                componentInputParameter: pipelinechannel--model_dir
              pipelinechannel--qwk_gate:
