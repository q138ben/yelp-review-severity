          inputs:
            parameters:
              location:
                runtimeValue:
                  constant: europe-north1
              model_dir:
                componentInputParameter: pipelinechannel--model_dir
              project:
                runtimeValue:
                  constant: yelp-review-rating-prediction
          taskInfo:
            name: train-container
    inputDefinitions:
      parameters:
        pipelinechannel--model_dir:
          parameterType: STRING
        pipelinechannel--qwk_gate:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--train_model:
          parameterType: BOOLEAN
  comp-condition-4:
    dag:
      tasks:
        condition-5:
          componentRef:
