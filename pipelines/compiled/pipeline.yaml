                componentInputParameter: pipelinechannel--train_model
          taskInfo:
            name: deploy-only
          triggerPolicy:
            condition: '!(inputs.parameter_values[''pipelinechannel--train_model'']
              == true)'
    inputDefinitions:
      parameters:
        pipelinechannel--model_dir:
          parameterType: STRING
        pipelinechannel--qwk_gate:
