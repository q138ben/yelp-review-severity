  comp-deploy-cloud-run:
    executorLabel: exec-deploy-cloud-run
    inputDefinitions:
      parameters:
        cpu:
          parameterType: STRING
        image:
          parameterType: STRING
        max_instances:
          parameterType: NUMBER_INTEGER
        memory:
          parameterType: STRING
        min_instances:
          parameterType: NUMBER_INTEGER
        model_uri:
          parameterType: STRING
        project:
          parameterType: STRING
        region:
          parameterType: STRING
        service:
          parameterType: STRING
        service_account:
          parameterType: STRING
  comp-deploy-cloud-run-2:
    executorLabel: exec-deploy-cloud-run-2
    inputDefinitions:
      parameters:
        cpu:
          parameterType: STRING
        image:
          parameterType: STRING
        max_instances:
          parameterType: NUMBER_INTEGER
        memory:
          parameterType: STRING
        min_instances:
          parameterType: NUMBER_INTEGER
        model_uri:
          parameterType: STRING
        project:
          parameterType: STRING
        region:
          parameterType: STRING
        service:
          parameterType: STRING
        service_account:
          parameterType: STRING
  comp-read-metrics:
    executorLabel: exec-read-metrics
    inputDefinitions:
      parameters:
        model_dir:
          parameterType: STRING
    outputDefinitions:
      parameters:
        mae:
          parameterType: NUMBER_DOUBLE
        qwk:
          parameterType: NUMBER_DOUBLE
  comp-read-metrics-2:
    executorLabel: exec-read-metrics-2
    inputDefinitions:
      parameters:
        model_dir:
          parameterType: STRING
    outputDefinitions:
      parameters:
        mae:
          parameterType: NUMBER_DOUBLE
        qwk:
          parameterType: NUMBER_DOUBLE
  comp-train-container:
    executorLabel: exec-train-container
    inputDefinitions:
      parameters:
        base_output_directory:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        display_name:
          defaultValue: train-ordinal-encoder
          isOptional: true
          parameterType: STRING
        enable_web_access:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
        encryption_spec_key_name:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        labels:
          isOptional: true
          parameterType: STRUCT
        location:
          defaultValue: '{{$.pipeline_google_cloud_location}}'
          isOptional: true
          parameterType: STRING
        max_wait_duration:
          defaultValue: 86400s
          isOptional: true
          parameterType: STRING
        model_dir:
          parameterType: STRING
        network:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        persistent_resource_id:
          defaultValue: '{{$.pipeline_persistent_resource_id}}'
          isOptional: true
          parameterType: STRING
        project:
          defaultValue: '{{$.pipeline_google_cloud_project_id}}'
          isOptional: true
          parameterType: STRING
        psc_interface_config:
          isOptional: true
          parameterType: STRUCT
        reserved_ip_ranges:
          isOptional: true
          parameterType: LIST
        restart_job_on_worker_restart:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
        service_account:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        strategy:
          defaultValue: STANDARD
          isOptional: true
          parameterType: STRING
        tensorboard:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        timeout:
          defaultValue: 604800s
          isOptional: true
          parameterType: STRING
        worker_pool_specs:
          defaultValue:
          - container_spec:
              args:
