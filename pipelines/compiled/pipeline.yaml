          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_cloud_run(project: str, region: str, service: str, image:\
          \ str, model_uri: str,\n                     service_account: str, cpu:\
          \ str, memory: str,\n                     min_instances: int, max_instances:\
          \ int):\n    \"\"\"Create/update the Cloud Run scoring service via the Admin\
          \ API (auth via the pipeline SA).\n\n    Uses run_v2 rather than shelling\
          \ out to gcloud so it runs reliably as a KFP lightweight component.\n  \
          \  Service is private by default (no allUsers IAM binding).\n    \"\"\"\n\
          \    from google.cloud import run_v2\n    client = run_v2.ServicesClient()\n\
          \    parent = f\"projects/{project}/locations/{region}\"\n    name = f\"\
          {parent}/services/{service}\"\n    svc = run_v2.Service(template=run_v2.RevisionTemplate(\n\
          \        service_account=service_account,\n        scaling=run_v2.RevisionScaling(min_instance_count=min_instances,\
          \ max_instance_count=max_instances),\n        containers=[run_v2.Container(\n\
          \            image=image,\n            env=[run_v2.EnvVar(name=\"MODEL_URI\"\
          , value=model_uri)],\n            resources=run_v2.ResourceRequirements(limits={\"\
          cpu\": cpu, \"memory\": memory}),\n            ports=[run_v2.ContainerPort(container_port=8080)],\n\
          \        )],\n    ))\n    try:\n        client.get_service(name=name)\n\
          \        svc.name = name\n        op = client.update_service(service=svc)\n\
          \    except Exception:\n        op = client.create_service(parent=parent,\
          \ service=svc, service_id=service)\n    print(\"deployed:\", op.result().uri)\n\
          \n"
        image: python:3.11-slim
